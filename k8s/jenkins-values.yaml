controller:
  admin:
    username: admin
    password: admin123!

  serviceType: ClusterIP

  # ✅ Low-memory tuning (IMPORTANT)
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - job-dsl:latest
    - configuration-as-code:latest
    - git:latest
    - credentials:latest

  persistence:
    enabled: true
    size: 5Gi

  JCasC:
    defaultConfig: false
    configScripts:
      jcasc-config: |
        jenkins:
          numExecutors: 0
          securityRealm:
            local:
              allowsSignup: false
              users:
                - id: "admin"
                  password: "admin123!"
          authorizationStrategy:
            loggedInUsersCanDoAnything:
              allowAnonymousRead: false

          clouds:
            - kubernetes:
                name: "kubernetes"
                namespace: "jenkins"
                serverUrl: "https://kubernetes.default"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                containerCapStr: "10"

          systemMessage: "Local Minikube Jenkins (JCasC)"

        jobs:
          - script: >
              pipelineJob('insert-time-into-postgres') {
                description('Runs a dynamic K8s pod that inserts current timestamp into Postgres every 5 minutes.')
                triggers { cron('H/5 * * * *') }
                definition {
                  cps {
                    sandbox(true)
                    script('pipeline {\n  agent {\n    kubernetes {\n      label \"time-writer-agent\"\n      defaultContainer \"writer\"\n      yaml \'\'\'\napiVersion: v1\nkind: Pod\nmetadata:\n  labels:\n    app: time-writer\nspec:\n  restartPolicy: Never\n  containers:\n    - name: writer\n      image: time-writer:1.0\n      imagePullPolicy: IfNotPresent\n      env:\n        - name: DB_HOST\n          value: \"postgres-postgresql.devops.svc.cluster.local\"\n        - name: DB_USER\n          value: \"devopsuser\"\n        - name: DB_NAME\n          value: \"devopsdb\"\n        - name: DB_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: postgres-secret\n              key: password\n\'\'\'\n    }\n  }\n  stages {\n    stage(\\'Write timestamp\\') {\n      steps { sh \\'/app/entrypoint.sh\\' }\n    }\n  }\n}')
                  }
                }
              }

rbac:
  create: true

agent:
  enabled: true
  namespace: jenkins