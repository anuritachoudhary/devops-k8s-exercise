deployment:
  replicas: 1

service:
  type: NodePort

ports:
  web:
    port: 80
    nodePort: 30080
    expose:
      default: true
  websecure:
    port: 443
    nodePort: 30443
    expose:
      default: true

additionalArguments:
  - "--api.dashboard=true"
  - "--providers.kubernetesingress=true"
  - "--entrypoints.web.address=:80"
  - "--entrypoints.websecure.address=:443"
